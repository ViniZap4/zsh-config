name: zsh-config
description: Zsh shell configuration with Oh My Zsh, fzf, zoxide, and aliases
platforms:
  - macos
  - linux
links:
  - source: .zshrc
    target: ~/.zshrc
dependencies:
  brew:
    - zsh
    - curl
    - fzf
    - zoxide
    - bat
    - eza
    - zsh-autosuggestions
  apt:
    - zsh
    - curl
    - fzf
    - zoxide
    - bat
    - eza
  pacman:
    - zsh
    - curl
    - fzf
    - zoxide
    - bat
    - eza
    - zsh-autosuggestions
  dnf:
    - zsh
    - curl
    - fzf
    - zoxide
    - bat
    - eza
  zypper:
    - zsh
    - curl
    - fzf
    - zoxide
    - bat
    - eza
